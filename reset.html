<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

<style>
    
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Georgia', Times, serif;
    background: #710349;
    min-height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
}

.container {
    text-align: center;
    width: 100%;
    max-width: 700px;
}

.logo-container {
    margin-bottom: 0;
    width: 100%;
}

.logo {
    width: 100%;
    max-width: 320px;
    height: auto;
    display: block;
    margin: 0 auto;
}

.title {
    color: white;
    font-size: 28px;
    margin: 5px 0 15px 0;
    font-weight: normal;
    letter-spacing: 1px;
}

.form-card {
    background-color: #DCDCDC;
    border-radius: 30px;
    padding: 30px 45px;
    text-align: left;
    box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.2);
    width: 100%;
}

.instruction {
    color: black;
    font-size: 16px;
    text-align: center;
    margin-bottom: 20px;
    font-weight: 500;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    font-size: 17px;
    color: black;
    margin-bottom: 8px;
    font-weight: bold;
}

.form-group input {
    width: 100%;
    padding: 13px 18px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    color: black;
    background-color: white;
}

.form-group input::placeholder {
    color: #A49A9A;
    font-size: 16px;
}

.btn-reset {
    width: 100%;
    background-color: #710349;
    color: white;
    border: none;
    border-radius: 35px;
    padding: 14px;
    font-size: 18px;
    font-family: 'Georgia', serif;
    cursor: pointer;
    text-transform: uppercase;
    margin-top: 10px;
    margin-bottom: 15px;
    letter-spacing: 1px;
    font-weight: bold;
}

.btn-reset:hover {
    background-color: #710349;
}

.login-link {
    text-align: center;
    font-size: 16px;
    color: black;
}

.login-link a {
    color: #5778FE;
    text-decoration: none;
    font-weight: bold;
}

.login-link a:hover {
    text-decoration: underline;
}
</style>

</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="wedding_logo.png" alt="Wedding Logo" class="logo">
        </div>

        <h2 class="title">Reset Password</h2>

        <div class="form-card">
            <p class="instruction">Please type something you will remember.</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="Enter New Passsword" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm Your New Password" required>
                </div>

                <button type="submit" class="btn-reset">Reset Password</button>

                <div class="login-link">
                    Already have an account ? <a href="#">Login here</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
