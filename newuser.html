<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Account</title>
    <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background: radial-gradient(circle at center,
    #7d0552 0%,
    #520131 70%,
    #2b0019 100%);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:30px 20px;
}

.page-title{
    color:#fff;
    font-size:42px;
    margin-bottom:25px;
    font-weight:600;
    text-shadow:0 2px 10px rgba(0,0,0,0.3);
}

.register-container{
    width:100%;
    max-width:800px;
    background:#fff;
    padding:40px 50px;
    border-radius:24px;
    box-shadow:
        0 4px 6px rgba(0,0,0,0.1),
        0 20px 40px rgba(0,0,0,0.2);
    animation:fadeInUp .6s ease;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    font-weight:600;
    color:#333;
}

.form-group input,
.form-group select{
    width:100%;
    height:52px;
    padding:0 16px;
    border:1.5px solid #e2e8f0;
    border-radius:10px;
    background:#f8fafc;
    font-size:15px;
    outline:none;
    transition:all .3s ease;
}

.form-group input:focus,
.form-group select:focus{
    border-color:#5F003F;
    background:#fff;
    box-shadow:0 0 0 4px rgba(95,0,63,0.15);
}

.form-group input::placeholder{
    color:#94a3b8;
}

.submit-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:10px;
    background:#5F003F;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
    transition:all .3s ease;
    box-shadow:0 4px 12px rgba(95,0,63,0.3);
}

.submit-btn:hover{
    background:#42022E;
    transform:translateY(-2px);
}

.login-link{
    margin-top:20px;
    color:white;
    font-size:14px;
    text-align:center;
}

.login-link a{
    color:white;
    font-weight:600;
    text-decoration:none;
}

.login-link a:hover{
    text-decoration:underline;
}

@keyframes fadeInUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
    </style>
</head>
<body>

    <h1 class="page-title">Create New Account</h1>

    <div class="register-container">
    
    <form>
        <div class="form-group">
        <label for="fullname">Fullname</label>
        <input type="text" id="fullname" placeholder="Enter your fullname" required>
        </div>

        <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="customer@gmail.com" required>
        </div>

        <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="01x-xxxxxxxx" required>
        </div>

        <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password must contain at least 8 characters..." required>
        </div>

        <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" placeholder="Re-enter password" required>
        </div>

        <div class="form-group">
        <label for="role">Register As</label>
        <select id="role" required>
            <option value="" disabled selected>Select Role</option>
            <option value="Customer">Customer</option>
            <option value="Venue Owner">Venue Owner</option>
            <option value="Admin">Admin</option>
        </select>
        </div>

        <button type="submit" class="submit-btn">Register</button>
    </form>
    </div>

    <div class="login-link">
    Already have an account? <a href="login.html">Login here</a>
    </div>

</body>
</html>
