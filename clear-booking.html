<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Booking | Wedding Hall Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Georgia', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #f5f0e8 0%, #e8ddd0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .clear-container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h2 {
            color: #8B3A3A;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        p {
            color: #666;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .loading {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #8B3A3A;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 1rem;
            border-radius: 0.8rem;
            margin: 1rem 0;
            display: none;
        }

        .btn {
            background: #8B3A3A;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
        }

        .btn:hover {
            background: #6b2a2a;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="clear-container" id="clearContainer">
        <div class="icon">🗑️</div>
        <h2>Clear Booking Data</h2>
        <p>This will remove all your saved booking information from this browser.</p>
        
        <div class="loading" id="loading" style="display: none;"></div>
        
        <div class="success-message" id="successMessage">
            ✅ Booking data cleared successfully!
        </div>
        
        <div id="buttonGroup">
            <button class="btn" onclick="clearBooking()">Clear Booking</button>
            <button class="btn btn-secondary" onclick="goBack()">Cancel</button>
        </div>
    </div>

    <script>
        function clearBooking() {
            // Show loading animation
            document.getElementById('loading').style.display = 'inline-block';
            document.getElementById('buttonGroup').style.display = 'none';
            
            // Simulate clearing data (like PHP session clearing)
            setTimeout(function() {
                // Clear localStorage (simulates clearing PHP session)
                localStorage.removeItem('last_booking');
                localStorage.removeItem('booked_hall');
                localStorage.removeItem('booking_success');
                localStorage.removeItem('booked_hall_name');
                
                // Also clear sessionStorage for extra measure
                sessionStorage.clear();
                
                // Hide loading, show success
                document.getElementById('loading').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                
                // Redirect to booking page after 1.5 seconds
                setTimeout(function() {
                    window.location.href = 'booking.html';
                }, 1500);
            }, 800);
        }
        
        function goBack() {
            window.history.back();
        }
        
        // Optional: Display current booking data if exists
        function displayCurrentBooking() {
            const lastBooking = localStorage.getItem('last_booking');
            if (lastBooking) {
                const infoDiv = document.createElement('div');
                infoDiv.style.background = '#f0f0f0';
                infoDiv.style.padding = '1rem';
                infoDiv.style.borderRadius = '0.8rem';
                infoDiv.style.marginBottom = '1rem';
                infoDiv.style.fontSize = '0.9rem';
                infoDiv.innerHTML = '<strong>Current booking:</strong><br>' + lastBooking;
                document.getElementById('clearContainer').insertBefore(infoDiv, document.getElementById('buttonGroup'));
            }
        }
        
        // Uncomment to show current booking info
        // displayCurrentBooking();
    </script>
</body>
</html>
