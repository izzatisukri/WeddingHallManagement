<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Owner Panel</title>
</head>
<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Georgia', serif;
}

body {
    background-color: #DCDCDC;
    color: #333;
    min-height: 100vh;
}

.container {
    width: 100%;
    padding-bottom: 50px;
}

.header {
    background-color: #FFFFFF;
    text-align: center;
    padding: 25px 10px;
    border-bottom: 1px solid #ddd;
    width: 100%;
}

.logo-area {
    font-size: 26px;
    margin-bottom: 20px;
    color: #111;
}

.nav-links a {
    text-decoration: none;
    color: #111;
    margin: 0 20px;
    font-size: 18px;
    font-weight: bold;
}

.nav-links a.active {
    color: #710349;
    border-bottom: 2px solid #710349;
    padding-bottom: 4px;
}

.nav-links a.logout {
    color: #ff3333;
}

.welcome-banner {
    background-color: #710349;
    color: white;
    text-align: center;
    margin: 40px auto 20px auto;
    padding: 35px;
    border-radius: 25px;
    width: 90%;
    max-width: 1200px;
}

.welcome-banner h2 {
    font-size: 28px;
    margin-bottom: 10px;
}

.welcome-banner p {
    font-size: 15px;
    opacity: 0.9;
}

.stats-container {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin: 0 auto 30px auto;
    width: 90%;
    max-width: 1200px;
}

.stat-card {
    background-color: white;
    color: black;
    padding: 15px 20px;
    border-radius: 30px;
    text-align: center;
    flex: 1;
    font-weight: bold;
    font-size: 16px;
    box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
}

.content-section {
    background-color: #710349;
    color: white;
    margin: 0 auto;
    padding: 35px;
    border-radius: 25px;
    width: 90%;
    max-width: 1200px;
    position: relative;
    min-height: 320px;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.section-header h3 {
    font-size: 24px;
    font-weight: normal;
}

.btn-add {
    background-color: #ffffff;
    color: #000000;
    text-decoration: none;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
}

.btn-edit {
    background-color: #ffffff;
    color: #000000;
    border: 1px solid #ccc;
    padding: 6px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    margin-right: 5px;
}

.btn-delete {
    background-color: #ff0000;
    color: white;
    border: none;
    padding: 6px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
}

table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 16px;
}

th,
td {
    padding: 16px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

th {
    font-weight: normal;
}

td:last-child {
    white-space: nowrap;
}

.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    display: none;
}

.modal-box-add {
    background-color: #D3D3D3;
    width: 90%;
    max-width: 650px;
    padding: 30px;
    border-radius: 20px;
    color: #000;
}

.modal-box-add h3 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 20px;
    font-weight: normal;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    font-size: 18px;
    margin-bottom: 5px;
}

.form-group input,
.form-group textarea,
.form-group select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
    background-color: #fff;
}

.form-actions {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
}

.btn-submit {
    background-color: #4D64FF;
    color: white;
    border: none;
    padding: 10px 45px;
    font-size: 18px;
    border-radius: 8px;
    cursor: pointer;
}

.btn-cancel {
    background-color: #ffffff;
    color: black;
    border: 1px solid #aaa;
    padding: 10px 45px;
    font-size: 18px;
    border-radius: 8px;
    cursor: pointer;
}

.modal-box-delete {
    background-color: #C2B7B7;
    width: 90%;
    max-width: 500px;
    padding: 40px 20px;
    text-align: center;
    border-radius: 12px;
    color: #000;
}

.modal-box-delete p {
    font-size: 18px;
    margin-bottom: 30px;
}

.btn-confirm-ok {
    background-color: #ffffff;
    color: #000000;
    border: 1px solid #999;
    padding: 10px 40px;
    font-size: 18px;
    border-radius: 6px;
    cursor: pointer;
    width: 42%;
}

.toast-notification {
    position: absolute;
    bottom: 15px;
    right: 20px;
    background-color: #35C95D;
    color: white;
    padding: 8px 20px;
    border-radius: 4px;
    font-size: 14px;
    display: none;
    z-index: 10;
}

</style>
<body>
    
</body>
</html>
