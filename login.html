<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Hall Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Georgia', Times, serif;
        }

        body{
            background:#710349;
            min-height:100vh; 
            width: 100vw;
            display:flex;
            justify-content:center;
            align-items:center;
            padding: 10px 20px; 

        }

        .container{
            width:100%;
            max-width: 700px;
            text-align:center;
        }

        .logo img{
            width: 100%;
            max-width: 320px;
            height: auto;
            display: block;
            margin: 0 auto; 
            width:120px;
            margin-bottom:10px;
        }

        .logo h2{
            color: white;
            font-size: 28px;
            margin: 5px 0 15px 0;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .login-box{
            background-color: #DCDCDC;
            border-radius: 30px;
            padding: 30px 45px;
            text-align: left;
            box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
        }

        form{
            text-align:left;
        }

        label{
            display: block;
            font-size: 17px;
            color: black;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input,select{
           width: 100%;
           padding: 13px 18px;
           border: none;
           border-radius: 10px;
           font-size: 16px;
           color: black;
           background-color: white; 
           margin-bottom: 16px;
        }

        button{
             width: 100%;
              background-color: #710349;
              color: white;
              border: none;
              border-radius: 35px;
              padding: 14px;
              font-size: 18px;
              font-family: 'Georgia', serif;
              cursor: pointer;
              text-transform: uppercase;
              margin-top: 10px;
              margin-bottom: 15px;
              letter-spacing: 1px;
              font-weight: bold;
        }

        button:hover{
            background:#710349;
        }

        .links{
            text-align:center;
            margin-top:15px;
        }

        .links a{
            text-decoration:none;
            color:#333;
            margin:0 5px;
        }

        .links a:hover{
            color:#710349;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="logo">
        <img src="wedding_logo.png" alt="Logo">
        <h2>Login to Your Account</h2>
    </div>

    <div class="login-box">

        <form action="" method="POST">

            <label>Email Address</label>
            <input type="email" placeholder="customer@gmail.com" required>

            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>

            <label>Login As</label>
            <select required>
                <option value="">Select Role</option>
                <option>Customer</option>
                <option>Venue Owner</option>
                <option>Admin</option>
            </select>

            <button type="submit">LOGIN</button>

        </form>

        <div class="links">
            <a href="#">Forgot Password</a>
            <span>|</span>
            <a href="#">Register Here</a>
        </div>

    </div>

</div>

</body>
</html>
