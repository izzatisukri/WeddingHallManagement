<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Hall Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#7a0055;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:800px;
            text-align:center;
        }

        .logo img{
            width:120px;
            margin-bottom:10px;
        }

        .logo h1{
            color:white;
            letter-spacing:3px;
            font-size:38px;
        }

        .logo h3{
            color:white;
            letter-spacing:8px;
            margin-bottom:15px;
        }

        .logo h2{
            color:white;
            font-size:32px;
            margin-bottom:30px;
        }

        .login-box{
            background:#e5e5e5;
            border-radius:30px;
            padding:30px;
        }

        form{
            text-align:left;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            font-size:15px;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:15px;
            border:none;
            border-radius:30px;
            background:#8a005d;
            color:white;
            font-size:24px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#690044;
        }

        .links{
            text-align:center;
            margin-top:15px;
        }

        .links a{
            text-decoration:none;
            color:#333;
            margin:0 5px;
        }

        .links a:hover{
            color:#8a005d;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="logo">
        <img src="wedding_logo.png" alt="Logo">
        <h1>WEDDING HALL</h1>
        <h3>MANAGEMENT</h3>
        <h2>Login to Your Account</h2>
    </div>

    <div class="login-box">

        <form action="" method="POST">

            <label>Email Address</label>
            <input type="email" placeholder="customer@gmail.com" required>

            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>

            <label>Login As</label>
            <select required>
                <option value="">Select Role</option>
                <option>Customer</option>
                <option>Venue Owner</option>
                <option>Admin</option>
            </select>

            <button type="submit">LOGIN</button>

        </form>

        <div class="links">
            <a href="#">Forgot Password</a>
            <span>|</span>
            <a href="#">Register Here</a>
        </div>

    </div>

</div>

</body>
</html>
